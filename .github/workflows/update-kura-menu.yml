name: Update Kura Menu

on:
  schedule:
    # 毎日 04:00 JST に更新（UTC 19:00）
    - cron: "0 19 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-menu:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Fetch latest Kura menu
        run: npm run update-menu

      - name: Commit updated menu-data.js
        run: |
          if git diff --quiet -- menu-data.js; then
            echo "menu-data.js has no changes."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add menu-data.js
          git commit -m "Update Kura menu data"
          git push
