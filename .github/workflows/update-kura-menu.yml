name: Update Kura Sushi menu

on:
  schedule:
    # 毎日 04:00 JST に実行（UTC 19:00）
    - cron: "0 19 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-menu:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Fetch Kura Sushi menu
        run: npm run update-menu

      - name: Commit updated menu-data.js
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update Kura Sushi menu data"
          file_pattern: menu-data.js
